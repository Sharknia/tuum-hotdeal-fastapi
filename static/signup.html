<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원가입 - tuum.day</title>
        <script src="./js/auth.js?v=1.0.0"></script>
        <script src="./signup.js?v=1.0.1"></script>
        <script>
            async function init() {
                const tokens = await getTokens();
                if (tokens.accessToken) {
                    window.location.href = '/home';
                }
            }

            init();
        </script>
        <link rel="stylesheet" href="/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="signup-page">
        <div class="auth-container">
            <div class="auth-box">
                <h1>tuum.day</h1>
                <p>회원가입 후 관리자 승인 완료 시 로그인할 수 있습니다.</p>
                <p id="signup-feedback" class="auth-feedback auth-feedback-error" hidden aria-live="polite"></p>
                <form id="signup-form">
                    <div class="input-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                    <div class="input-group">
                        <label for="password-confirm">비밀번호 확인</label>
                        <input type="password" id="password-confirm" name="password_confirm" required />
                    </div>
                    <div class="input-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" name="nickname" required />
                    </div>
                    <button type="submit" class="auth-button">회원가입</button>
                </form>
                <section id="signup-pending" class="auth-status-card" hidden>
                    <h2>가입 신청이 접수되었습니다</h2>
                    <p>
                        <strong id="pending-nickname">회원</strong>님(<span id="pending-email"></span>)의 계정은
                        현재 <strong>승인 대기</strong> 상태입니다.
                    </p>
                    <ul class="auth-status-list">
                        <li>승인 완료 시 등록한 이메일로 안내 메일이 발송됩니다.</li>
                        <li>메일의 로그인 링크로 접속해 로그인 후 핫딜 페이지를 이용해 주세요.</li>
                    </ul>
                    <a class="auth-secondary-button" href="/login">로그인 페이지로 이동</a>
                </section>
                <div class="auth-link">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
            </div>
        </div>
    </body>
</html>
