services:
  web:
    image: ghcr.io/sharknia/tuum-hotdeal-fastapi:latest
    container_name: tuum-hotdeal-api
    mem_limit: 1g
    mem_reservation: 256m
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
    command:
      [
        "doppler",
        "run",
        "--",
        "/app/entrypoint.sh",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 90s
    ports:
      - "10000:8000"
    restart: unless-stopped

  worker:
    image: ghcr.io/sharknia/tuum-hotdeal-fastapi:latest
    container_name: tuum-hotdeal-worker
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
    command: ["doppler", "run", "--", "python", "-m", "app.worker_main"]
    healthcheck:
      disable: true
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 90s
    restart: unless-stopped
